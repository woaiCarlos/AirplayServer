name: Build Android Binary arm64

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Download NDK
        run: |
          wget -O ndk.zip https://dl.google.com/android/repository/android-ndk-r25c-linux.zip
          unzip -q ndk.zip

      - name: Build arm64-v8a
        run: |
          NDK=$PWD/android-ndk-r25c
          CC=$NDK/toolchains/llvm/prebuilt/linux-x86_64/bin/aarch64-linux-android21-clang
          $CC main.c -o mytool
          
      - name: Upload binary
        uses: actions/upload-artifact@v4
        with:
          name: mytool_arm64
          path: mytool
