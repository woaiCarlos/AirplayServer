name: Build AirplayServer APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3
        with:
          ndk-version: r25c

      - name: Download Gradle
        run: |
          wget -q -O gradle.zip --no-proxy "https://services.gradle.org/distributions/gradle-7.6-bin.zip"
          unzip -q gradle.zip
          ls gradle-4.6/bin/          

      - name: Build APK
        run: |
          export PATH=$PWD/gradle-4.6/bin:$PATH
          gradle assembleDebug --no-daemon -p app 2>&1          

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: airplayserver-apk
          path: app/build/outputs/apk/debug/app-debug.apk
